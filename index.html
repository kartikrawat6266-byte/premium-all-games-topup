<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BeStChEat | Premium Card Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        /* ========== BACKGROUND ========== */
        .adventure-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 0;
        }

        .mountain {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(180deg, transparent, #1a1a3e);
            clip-path: polygon(0% 100%, 0% 60%, 10% 40%, 20% 55%, 30% 35%, 45% 50%, 60% 30%, 75% 45%, 85% 25%, 100% 40%, 100% 100%);
            animation: mountainFloat 8s ease-in-out infinite;
            z-index: 0;
        }
        .mountain-2 {
            height: 35%;
            background: linear-gradient(180deg, transparent, #2a2555);
            clip-path: polygon(0% 100%, 0% 70%, 15% 55%, 25% 65%, 40% 45%, 55% 60%, 70% 40%, 85% 55%, 100% 45%, 100% 100%);
            animation: mountainFloat 10s ease-in-out infinite reverse;
            opacity: 0.7;
        }
        @keyframes mountainFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(15px); }
        }

        .sun-glow {
            position: fixed;
            top: 10%;
            right: 5%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ff9a56, #ff6b35, transparent);
            border-radius: 50%;
            filter: blur(40px);
            animation: sunPulse 4s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes sunPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.08), 
                rgba(255, 0, 255, 0.08), 
                rgba(255, 100, 0, 0.08), 
                transparent);
            animation: auroraMove 12s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes auroraMove {
            0%, 100% { transform: translateX(-30%) skewX(10deg); opacity: 0.3; }
            50% { transform: translateX(30%) skewX(-10deg); opacity: 0.6; }
        }

        /* ========== MOON ========== */
        .moon-container {
            position: fixed;
            top: 5%;
            right: 5%;
            z-index: 2;
            animation: moonContainerFloat 6s ease-in-out infinite;
        }
        @keyframes moonContainerFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .premium-moon {
            position: relative;
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 35% 35%, #fff8e7, #ffe6b3, #ffd89a);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 235, 170, 0.8), inset -8px -5px 15px rgba(0, 0, 0, 0.2);
            animation: moonPulse 3s ease-in-out infinite;
        }
        @keyframes moonPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .crater {
            position: absolute;
            background: radial-gradient(circle, rgba(180, 130, 70, 0.4), rgba(140, 100, 50, 0.2));
            border-radius: 50%;
        }
        .crater1 { width: 10px; height: 10px; top: 15%; left: 12%; }
        .crater2 { width: 7px; height: 7px; top: 45%; left: 25%; }
        .crater3 { width: 12px; height: 12px; bottom: 20%; right: 15%; }
        .crater4 { width: 6px; height: 6px; top: 60%; right: 35%; }
        .crater5 { width: 8px; height: 8px; top: 25%; right: 25%; }

        .moon-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 230, 150, 0.3);
            transform: translate(-50%, -50%);
            animation: ringPulse 3s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
        }

        /* ========== STARS ========== */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* ========== EMOJIS ========== */
        .top-emoji {
            position: fixed;
            font-size: 28px;
            animation: moveDown 5s ease-in-out infinite;
            z-index: 1;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
            cursor: pointer;
        }
        @keyframes moveDown {
            0% { transform: translateY(0px); opacity: 1; }
            50% { transform: translateY(60vh); opacity: 0.5; }
            100% { transform: translateY(0px); opacity: 1; }
        }

        .bottom-emoji {
            position: fixed;
            font-size: 28px;
            animation: moveUp 5s ease-in-out infinite;
            z-index: 1;
            filter: drop-shadow(0 0 5px rgba(255,215,0,0.6));
            cursor: pointer;
        }
        @keyframes moveUp {
            0% { transform: translateY(0px); opacity: 1; }
            50% { transform: translateY(-55vh); opacity: 0.5; }
            100% { transform: translateY(0px); opacity: 1; }
        }

        .t1 { top: 2%; left: 2%; animation-delay: 0s; }
        .t2 { top: 5%; left: 12%; animation-delay: 0.8s; font-size: 24px; }
        .t3 { top: 1%; right: 3%; animation-delay: 1.5s; font-size: 30px; }
        .t4 { top: 8%; right: 15%; animation-delay: 2.2s; font-size: 22px; }
        .t5 { top: 12%; left: 20%; animation-delay: 3s; font-size: 26px; }
        .t6 { top: 3%; right: 25%; animation-delay: 3.8s; font-size: 24px; }
        .t7 { top: 10%; left: 30%; animation-delay: 4.5s; font-size: 22px; }
        .t8 { top: 6%; right: 8%; animation-delay: 5.2s; font-size: 26px; }

        .b1 { bottom: 2%; left: 3%; animation-delay: 0.5s; }
        .b2 { bottom: 5%; left: 14%; animation-delay: 1.2s; font-size: 24px; }
        .b3 { bottom: 1%; right: 4%; animation-delay: 2s; font-size: 30px; }
        .b4 { bottom: 7%; right: 18%; animation-delay: 2.8s; font-size: 22px; }
        .b5 { bottom: 10%; left: 25%; animation-delay: 3.5s; font-size: 26px; }
        .b6 { bottom: 3%; right: 28%; animation-delay: 4.2s; font-size: 24px; }
        .b7 { bottom: 8%; left: 8%; animation-delay: 5s; font-size: 22px; }
        .b8 { bottom: 4%; right: 12%; animation-delay: 5.5s; font-size: 26px; }

        /* ========== PARTICLES ========== */
        .particle {
            position: fixed;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 6s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-150px) scale(0); opacity: 0; }
        }

        /* ========== HEADER BOXES ========== */
        .bestcheat-box {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 100, 0, 0.1));
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 215, 0, 0.5);
            border-radius: 50px;
            padding: 6px 18px;
            display: inline-block;
            animation: boxGlowPulse 2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        @keyframes boxGlowPulse {
            0%, 100% { box-shadow: 0 0 6px rgba(255, 215, 0, 0.3); border-color: rgba(255, 215, 0, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); border-color: rgba(255, 215, 0, 0.8); transform: scale(1.01); }
        }

        .bestcheat-text {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ffd700, #ff6b35, #ff00ff, #00ffff, #ffd700);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textColorFlow 3s linear infinite;
            text-transform: uppercase;
        }
        @keyframes textColorFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .premium-shop-box {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 6px 20px;
            border-radius: 50px;
            display: inline-block;
            animation: shopBoxPulse 1.5s infinite;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
        }
        @keyframes shopBoxPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 8px rgba(255, 215, 0, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
        }

        .premium-shop-text {
            font-size: 12px;
            font-weight: 900;
            color: #0a0a19;
            letter-spacing: 1px;
        }

        /* ========== VIRTUAL TERMINAL BOX ========== */
        .virtual-container {
            text-align: left;
            margin-bottom: 15px;
        }
        .virtual-box {
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 40px;
            padding: 8px 20px;
            display: inline-block;
            animation: virtualGlow 2s ease-in-out infinite;
        }
        @keyframes virtualGlow {
            0%, 100% { box-shadow: 0 0 4px rgba(255, 215, 0, 0.2); border-color: rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 12px rgba(255, 215, 0, 0.5); border-color: rgba(255, 215, 0, 0.8); }
        }

        .virtual-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff6b35, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: left;
            letter-spacing: 0.5px;
        }

        .sub-text {
            font-size: 12px;
            font-weight: 700;
            color: #ffdfaa;
            margin-top: 8px;
            letter-spacing: 1px;
            text-align: left;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* ========== MAIN CARD CONTAINER ========== */
        .terminal-card {
            max-width: 450px;
            width: 100%;
            background: rgba(10, 10, 25, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 20px 22px 28px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 215, 0, 0.2);
            transition: transform 0.3s ease;
            z-index: 100;
            border: 1px solid rgba(255, 200, 50, 0.4);
        }

        .terminal-card:hover {
            transform: translateY(-3px);
        }

        .mods-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            gap: 8px;
            flex-wrap: wrap;
            flex-direction: column;
        }

        /* ========== SWIPEABLE CARDS ========== */
        .swipe-container {
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            margin-bottom: 20px;
            border-radius: 28px;
        }
        .swipe-container::-webkit-scrollbar {
            display: none;
        }
        .cards-wrapper {
            display: flex;
            gap: 20px;
            padding: 5px 5px 10px 5px;
        }
        .card-item {
            min-width: 100%;
            scroll-snap-align: start;
        }

        /* Credit Card Style */
        .card-mock {
            background: linear-gradient(135deg, rgba(20, 15, 45, 0.95), rgba(10, 8, 25, 0.98));
            border-radius: 28px;
            padding: 18px 20px 22px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        .card-mock:hover {
            transform: scale(1.01);
            border-color: #ffd700;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .card-type {
            font-weight: 800;
            font-size: 18px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .card-price {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            color: #0a0a19;
            animation: pricePulse 1s infinite;
        }
        @keyframes pricePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .card-number {
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: 600;
            font-family: monospace;
            margin: 15px 0 12px;
            color: #ffffff;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a8b2d1;
        }
        .card-balance {
            font-weight: 800;
            font-size: 16px;
            color: #ffd700;
            margin: 12px 0 8px;
        }
        .card-name {
            font-weight: 600;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 8px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Redeem Code Style */
        .redeem-code {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
            border: 1px dashed rgba(255, 215, 0, 0.5);
        }
        .code-label {
            font-size: 10px;
            color: #8a94b5;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .code-value {
            font-size: 18px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            color: #ffd700;
        }
        .trust-badge {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .trust-badge span {
            font-size: 9px;
            color: #4a8c3f;
            background: rgba(74, 140, 63, 0.15);
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }
        .add-cart {
            flex: 1;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 10px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #ffdfaa;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .buy-now {
            flex: 1;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 800;
            color: #0a0a1a;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .add-cart:active, .buy-now:active {
            transform: scale(0.96);
        }

        /* Scroll Indicator */
        .scroll-indicator {
            text-align: center;
            margin-top: 15px;
        }
        .scroll-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.3);
            transition: all 0.2s;
        }
        .dot.active {
            background: #ffd700;
            width: 20px;
            border-radius: 10px;
        }

        .upi-note {
            text-align: center;
            font-size: 10px;
            color: #8a94b5;
            margin-top: 18px;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a19;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2000;
            display: none;
        }

        @media (max-width: 550px) {
            .terminal-card { padding: 16px 16px 22px; max-width: 400px; }
            .card-number { font-size: 16px; letter-spacing: 1px; }
            .virtual-text { font-size: 18px; }
            .premium-shop-text { font-size: 10px; }
            .bestcheat-text { font-size: 8px; }
            .sub-text { font-size: 9px; }
            .code-value { font-size: 14px; }
            .premium-moon { width: 50px; height: 50px; }
            .moon-ring { width: 65px; height: 65px; }
        }
    </style>
</head>

    ];

    const UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT_NAME = "BESTCHEAT";
    const CURRENCY = "INR";

    // DOM Elements
    const cardsWrapper = document.getElementById('cardsWrapper');
    const swipeContainer = document.getElementById('swipeContainer');
    const scrollDots = document.getElementById('scrollDots');
    const toastMsg = document.getElementById('toastMsg');

    // Render Card HTML
    function renderCardHTML(card) {
        if (card.isPlayStore) {
            return `
                <div class="card-mock">
                    <div class="card-header">
                        <div class="card-type">🎮 ${card.type} REDEEM CODE</div>
                        <div class="card-price">₹${card.price}</div>
                    </div>
                    <div class="redeem-code">
                        <div class="code-label">🔑 YOUR REDEEM CODE</div>
                        <div class="code-value">${card.redeemCode}</div>
                        <div class="code-label" style="margin-top: 5px;">⚠️ Redeem on Google Play Store app</div>
                    </div>
                    <div class="card-balance">💎 REDEEM VALUE: ₹${card.balance.toLocaleString()}</div>
                    <div class="trust-badge">
                        <span>✅ Trusted Seller</span>
                        <span>⚡ Instant Delivery</span>
                        <span>🔒 Secure Code</span>
                    </div>
                    <div class="card-name">${card.name}</div>
                    <div class="action-buttons">
                        <div class="add-cart" onclick="addToCart(${card.id})">🛒 Add to Cart</div>
                        <div class="buy-now" onclick="buyNow(${card.id})">💎 Buy Now — ₹${card.price}</div>
                    </div>
                </div>
            `;
        } else {
            return `
                <div class="card-mock">
                    <div class="card-header">
                        <div class="card-type">💳 ${card.type}</div>
                        <div class="card-price">₹${card.price}</div>
                    </div>
                    <div class="card-number">${card.number}</div>
                    <div class="card-details">
                        <span>EXPIRES <strong>${card.expiry}</strong></span>
                        <span>CVV <strong>${card.cvv}</strong></span>
                    </div>
                    <div class="card-balance">💰 BALANCE: ₹${card.balance.toLocaleString()}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="action-buttons">
                        <div class="add-cart" onclick="addToCart(${card.id})">🛒 Add to Cart</div>
                        <div class="buy-now" onclick="buyNow(${card.id})">💎 Buy Now — ₹${card.price}</div>
                    </div>
                </div>
            `;
        }
    }

    // Render All Cards
    function renderAllCards() {
        cardsWrapper.innerHTML = '';
        cards.forEach((card, index) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card-item';
            cardDiv.innerHTML = renderCardHTML(card);
            cardsWrapper.appendChild(cardDiv);
        });
        
        // Create dots
        scrollDots.innerHTML = '';
        cards.forEach((_, index) => {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.setAttribute('data-index', index);
            scrollDots.appendChild(dot);
        });
        updateActiveDot();
    }

    // Update Active Dot on Scroll
    function updateActiveDot() {
        if (!swipeContainer) return;
        const scrollPosition = swipeContainer.scrollLeft;
        const cardWidth = swipeContainer.clientWidth;
        const activeIndex = Math.round(scrollPosition / cardWidth);
        
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
            if (idx === activeIndex) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    }

    // Add to Cart
    function addToCart(cardId) {
        const card = cards.find(c => c.id === cardId);
        showToast(`📦 Added to cart: ${card.type} - ₹${card.price}`);
    }
    
    // Buy Now
    function buyNow(cardId) {
        const card = cards.find(c => c.id === cardId);
        showToast(`💎 Processing payment for ₹${card.price}... Opening UPI app`);
        
        const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${card.price}&cu=${CURRENCY}&tn=Premium%20Card%20Purchase`;
        const anchor = document.createElement('a');
        anchor.href = upiUrl;
        anchor.style.display = 'none';
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        
        setTimeout(() => {
            if (card.isPlayStore) {
                showToast(`💰 Payment for ₹${card.price} successful! Redeem code: ${card.redeemCode} will be sent via email.`, 5000);
            } else {
                showToast(`💰 Payment request for ₹${card.price}. Open UPI app to complete!`, 4000);
            }
        }, 1000);
    }

    function showToast(msg, duration = 2500) {
        toastMsg.textContent = msg;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    // Scroll Event
    if (swipeContainer) {
        swipeContainer.addEventListener('scroll', updateActiveDot);
    }

    // Initialize
    renderAllCards();
</script>
</body>
</html>
