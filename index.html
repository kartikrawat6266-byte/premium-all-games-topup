<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GOD X MODS | Premium Virtual Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(145deg, #0a0c12 0%, #0f1119 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Main Card Container - Background solid rakha for text clarity */
        .terminal-card {
            max-width: 480px;
            width: 100%;
            background: #13161f;
            border-radius: 48px;
            padding: 24px 22px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 10;
        }

        /* Header - ALL TEXT VISIBLE */
        .mods-badge {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
        }
        .godx {
            font-size: 12px;
            letter-spacing: 1.2px;
            color: #ffdfaa;
            font-weight: 600;
        }
        .premium-tag {
            background: linear-gradient(135deg, #f5b042, #ffd966);
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 800;
            color: #13161f;
        }

        .main-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .sub {
            font-size: 13px;
            color: #9aa1b5;
            margin-bottom: 24px;
            border-left: 3px solid #ffcd6b;
            padding-left: 10px;
        }

        /* Credit Card Mockup - TEXT CLEAR */
        .card-mock {
            background: linear-gradient(125deg, #1b1f2e, #0f1119);
            border-radius: 32px;
            padding: 18px 22px 22px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-type {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .mastercard-logo {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 2px;
            color: #ffffff;
        }
        .price-chip {
            background: #1e2337;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            color: #ffdfa5;
        }
        .card-number {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 600;
            font-family: monospace;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #a8b2d1;
        }
        .holder-name {
            font-weight: 600;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 12px;
        }
        .balance-row {
            margin-top: 18px;
            background: #00000040;
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(255,200,100,0.2);
        }
        .balance-label {
            font-size: 13px;
            color: #a8b2d1;
        }
        .balance-amount {
            font-weight: 800;
            font-size: 18px;
            color: #ffdfa5;
        }

        /* Buttons Section - TEXT VISIBLE */
        .cards-selector {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
        }
        .card-option {
            flex: 1;
            background: #1b1f2e;
            border-radius: 28px;
            padding: 14px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,215,120,0.2);
        }
        .card-option.active {
            background: linear-gradient(125deg, #2a2f44, #1f253b);
            border: 1px solid #ffcd6b;
            box-shadow: 0 8px 18px -6px #ffcd6b30;
        }
        .card-option .price {
            font-size: 26px;
            font-weight: 800;
            color: #ffdfa5;
        }
        .card-option .type-text {
            font-size: 12px;
            color: #9aa1b5;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5b042, #ffcd7e);
            border: none;
            padding: 18px 0;
            font-size: 20px;
            font-weight: 800;
            border-radius: 60px;
            color: #0e0f16;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 8px 18px -4px #ffb34770;
        }
        .buy-btn:active {
            transform: scale(0.97);
        }

        .upi-note {
            text-align: center;
            font-size: 11px;
            color: #7a84a8;
            margin-top: 22px;
        }

        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2337;
            color: #ffdfa5;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 12px black;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .terminal-card { padding: 20px 16px 26px; }
            .card-number { font-size: 18px; letter-spacing: 2px; }
            .toast-msg { font-size: 12px; white-space: normal; text-align: center; width: 80%; }
        }
    </style>
</head>
<body>

<div class="terminal-card">
    <div class="mods-badge">
        <span class="godx">GOD X MODS PREMIUM</span>
        <span class="premium-tag">PREMIUM VT</span>
    </div>
    <div class="main-title">VIRTUAL TERMINAL</div>
    <div class="sub">secure • instant • premium</div>

    <!-- Credit Card Display -->
    <div class="card-mock">
        <div class="card-type">
            <span class="mastercard-logo">MASTER CARD</span>
            <span class="price-chip" id="displayPrice">₱150</span>
        </div>
        <div class="card-number">5412 7582 9314 XXXX</div>
        <div class="card-details">
            <span>EXPIRES <strong>XX/XXXX</strong></span>
            <span>CVV <strong>•••</strong></span>
        </div>
        <div class="balance-row">
            <span class="balance-label">BALANCE / LIMIT</span>
            <span class="balance-amount" id="displayBalance">₱5,000</span>
        </div>
        <div class="holder-name">ROHIT SHARMA</div>
    </div>

    <!-- Amount Selector -->
    <div class="cards-selector">
        <div class="card-option active" data-amount="150" data-balance="5000">
            <div class="price">₱150</div>
            <div class="type-text">MASTER CARD</div>
        </div>
        <div class="card-option" data-amount="200" data-balance="4800">
            <div class="price">₱200</div>
            <div class="type-text">MASTER CARD</div>
        </div>
    </div>

    <!-- Buy Button -->
    <button class="buy-btn" id="buyCardBtn">💳 Buy Card • ₱150</button>
    <div class="upi-note">⚡ Click Buy → Auto open GPay / PhonePe / PayTM</div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // UPI Configuration
    const UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT_NAME = "GODXMODS";
    const CURRENCY = "INR";

    let currentAmount = 150;
    let currentBalance = 5000;

    const option150 = document.querySelector('.card-option[data-amount="150"]');
    const option200 = document.querySelector('.card-option[data-amount="200"]');
    const buyBtn = document.getElementById('buyCardBtn');
    const displayPriceSpan = document.getElementById('displayPrice');
    const displayBalanceSpan = document.getElementById('displayBalance');
    const toastMsg = document.getElementById('toastMsg');

    function showToast(message, duration = 2000) {
        toastMsg.textContent = message;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    function setSelectedAmount(amount, balance) {
        currentAmount = amount;
        currentBalance = balance;
        displayPriceSpan.innerText = `₱${amount}`;
        displayBalanceSpan.innerText = `₱${balance}`;
        buyBtn.innerHTML = `💳 Buy Card • ₱${amount}`;

        if (amount === 150) {
            option150.classList.add('active');
            option200.classList.remove('active');
        } else {
            option200.classList.add('active');
            option150.classList.remove('active');
        }
    }

    function openUpiApp(amount) {
        const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amount}&cu=${CURRENCY}&tn=Premium%20Virtual%20Card%20₱${amount}`;
        
        const tempAnchor = document.createElement('a');
        tempAnchor.href = upiUrl;
        tempAnchor.style.display = 'none';
        document.body.appendChild(tempAnchor);
        tempAnchor.click();
        document.body.removeChild(tempAnchor);
        
        setTimeout(() => {
            showToast(`✅ Payment request sent for ₱${amount}. Open UPI app to complete.`, 4000);
        }, 500);
    }

    function handleBuy() {
        showToast(`✨ Opening UPI app for ₱${currentAmount}...`, 1500);
        openUpiApp(currentAmount);
    }

    option150.addEventListener('click', () => setSelectedAmount(150, 5000));
    option200.addEventListener('click', () => setSelectedAmount(200, 4800));
    buyBtn.addEventListener('click', handleBuy);

    setSelectedAmount(150, 5000);
</script>
</body>
</html>
